x;padding:6px 7px;gap:0;flex-wrap:wrap}.chip{padding:0 7px}.chip b{font-size:8.5px;margin-right:3px}.chip span{font-size:11.5px}.why{display:none}.why button{min-height:30px;padding:6px 4px;font-size:12px}.why button i{width:14px;height:14px}.why-text{padding:0 4px 8px;font-size:12px}.controls{position:static;padding:6px 0 0;gap:6px;display:grid;grid-template-columns:repeat(4,1fr)}.ctrl{height:36px;min-height:36px;flex:unset;width:auto;border-radius:8px}.ctrl i{width:18px;height:18px}.panel[data-sheet="collapsed"]{max-height:116px}.panel[data-sheet="collapsed"] .body,.panel[data-sheet="collapsed"] .callout,.panel[data-sheet="collapsed"] .chips,.panel[data-sheet="collapsed"] .why{display:none}.panel[data-sheet="expanded"]{max-height:56vh}.w{right:10px;top:10px;width:28px;height:28px;opacity:.45}.name-row{grid-template-columns:1fr}.num{display:none}.hashes{display:none}body.debug-mode .debug-toggle{right:10px;bottom:calc(10px + env(safe-area-inset-bottom));padding:7px 11px}body.debug-mode .debug-panel{left:8px;right:8px;bottom:calc(52px + env(safe-area-inset-bottom));width:auto;min-width:0;max-height:46vh;padding:10px;resize:none}.debug-coords{grid-template-columns:repeat(3,minmax(0,1fr));font-size:11px}.debug-actions{grid-template-columns:1fr 1fr}.debug-output{min-height:48px}}

<body>
<button class="w" id="whiteboardBtn" title="Coach board">W</button>
<main class="shell">
  <header>
    <h1>Learn Ultimate Frisbee</h1>
    <p class="sub">A simple step-by-step guide to 7v7 ultimate.</p>
  </header>
  <section class="topbar">
    <label>Practice<div class="select"><select id="practiceSelect"></select></div></label>
    <label>Line<div class="select"><select id="teamSelect"></select></div></label>
    <label class="view-label"><div class="label-row"><span>View</span><button class="edit" id="editNames" type="button">Edit roster</button></div><div class="select"><select id="playerSelect"></select></div></label>
    <div class="pull-options" id="pullOptions"><span>Pull</span><button class="pull-choice active" data-pull="middle">Middle</button><button class="pull-choice" data-pull="left">Left</button><button class="pull-choice" data-pull="right">Right</button></div>
  </section>
  <section class="layout">
    <div class="field-card" id="field">
      <div class="field-inner"></div><div class="endline"></div><div class="goal">ENDZONE</div>
      <div class="yard" style="top:21%"></div><div class="yard" style="top:48%"></div><div class="yard" style="top:77%"></div>
      <div class="num l" style="top:39%">20</div><div class="num r" style="top:39%">20</div><div class="num l" style="top:58%">10</div><div class="num r" style="top:58%">10</div>
      <div class="hashes l"></div><div class="hashes r"></div>
      <svg class="routes" id="routes" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
      <div class="disc" id="disc"></div>
    </div>
    <aside class="panel" id="lessonPanel" data-sheet="half">
      <button class="sheet-handle" id="sheetHandle" type="button" aria-label="Toggle lesson card"></button>
      <article class="lesson-card">
        <div class="count" id="stepCount"></div>
        <div class="progress"><span id="progressBar"></span></div>
        <h2 id="stepTitle"></h2>
        <div class="body" id="stepBody"></div>
        <div class="callout"><i data-lucide="user-round"></i><div><b id="calloutTitle"></b><div id="calloutText"></div></div></div>
        <div class="chips"><div class="chip"><b>Disc</b><span id="discChip"></span></div><div class="chip"><b>Reset</b><span id="resetChip"></span></div><div class="chip"><b>Next</b><span id="nextChip"></span></div></div>
      </article>
      <section class="why" id="whyBox"><button id="whyToggle"><i data-lucide="circle-help"></i>Why this works<i class="chev" data-lucide="chevron-down"></i></button><div class="why-text" id="whyText"></div></section>
      <nav class="controls"><button class="ctrl" id="prev" title="Back"><i data-lucide="skip-back"></i></button><button class="ctrl primary" id="play" title="Play"><i data-lucide="play"></i></button><button class="ctrl" id="next" title="Next"><i data-lucide="skip-forward"></i></button><button class="ctrl" id="reset" title="Reset step"><i data-lucide="rotate-cw"></i></button></nav>
    </aside>
  </section>
</main>
<section class="modal" id="nameModal"><div class="modal-card"><div class="modal-head"><h2>Edit roster</h2><button class="btn" id="closeNames">Cancel</button></div><label>Team<div class="select"><select id="editTeam"></select></div></label><label class="team-name">Team name<input id="teamNameInput"></label><div class="name-grid" id="nameRows"></div><div class="modal-actions"><button class="btn" id="resetNames">Reset to defaults</button><button class="btn green" id="saveNames">Save</button></div></div></section>
<section class="board" id="board"><div class="board-card"><div class="board-tools"><button class="btn" data-tool="off">Offense</button><button class="btn" data-tool="def">Defense</button><button class="btn" data-tool="disc">Disc</button><button class="btn" data-tool="red">Red line</button><button class="btn" data-tool="white">White line</button><button class="btn" id="undoBoard">Undo</button><button class="btn" id="clearBoard">Clear</button><button class="btn" id="closeBoard">Close</button></div><div class="board-field" id="boardField"><svg class="draw-svg" id="drawSvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div></div></section>
<script>

function callout(s){
