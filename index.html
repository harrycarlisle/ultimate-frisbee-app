<body>
<button class="w" id="whiteboardBtn" title="Coach board">W</button>
<main class="shell">
  <header>
    <div class="brand"><span class="logo"><i data-lucide="shield"></i></span><span>Ultimate Flow Coach</span></div>
    <h1>Learn 7v7 Ultimate Frisbee</h1>
    <p class="sub">Simple step-by-step roles for beginners.</p>
  </header>
  <section class="topbar">
    <div><div class="tabs" id="tabs"></div><div class="pull-options" id="pullOptions"><span>Pull</span><button class="pull-choice active" data-pull="middle">Middle</button><button class="pull-choice" data-pull="left">Left</button><button class="pull-choice" data-pull="right">Right</button></div></div>
    <label>Team<div class="select"><select id="teamSelect"></select></div></label>
    <label>Player<div class="select"><select id="playerSelect"></select></div></label>
    <button class="edit" id="editNames">Edit names</button>
  </section>
  <section class="layout">
    <div class="field-card" id="field">
      <div class="field-inner"></div><div class="endline"></div><div class="goal">ENDZONE</div><div class="start">START HERE</div>
      <div class="yard" style="top:21%"></div><div class="yard" style="top:48%"></div><div class="yard" style="top:77%"></div>
      <div class="num l" style="top:39%">20</div><div class="num r" style="top:39%">20</div><div class="num l" style="top:58%">10</div><div class="num r" style="top:58%">10</div>
      <div class="hashes l"></div><div class="hashes r"></div>
      <svg class="routes" id="routes" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
      <div class="disc" id="disc"></div>
    </div>
    <aside class="panel">
      <article class="lesson-card">
        <div class="count" id="stepCount"></div>
        <h2 id="stepTitle"></h2>
        <div class="body" id="stepBody"></div>
        <div class="callout"><i data-lucide="user-round"></i><div><b id="calloutTitle"></b><div id="calloutText"></div></div></div>
        <div class="chips"><div class="chip"><b>Disc</b><span id="discChip"></span></div><div class="chip"><b>Reset</b><span id="resetChip"></span></div><div class="chip"><b>Next</b><span id="nextChip"></span></div></div>
      </article>
      <section class="why" id="whyBox"><button id="whyToggle"><i data-lucide="circle-help"></i>Why?<i class="chev" data-lucide="chevron-down"></i></button><div class="why-text" id="whyText"></div></section>
      <nav class="controls"><button class="ctrl" id="prev" title="Back"><i data-lucide="skip-back"></i></button><button class="ctrl primary" id="play" title="Play"><i data-lucide="play"></i></button><button class="ctrl" id="next" title="Next"><i data-lucide="skip-forward"></i></button><button class="ctrl" id="reset" title="Reset step"><i data-lucide="rotate-cw"></i></button></nav>
    </aside>
  </section>
</main>
<section class="modal" id="nameModal"><div class="modal-card"><div class="modal-head"><h2>Edit names</h2><button class="btn" id="closeNames">Cancel</button></div><label>Team<div class="select"><select id="editTeam"></select></div></label><label class="team-name">Team name<input id="teamNameInput"></label><div class="name-grid" id="nameRows"></div><div class="modal-actions"><button class="btn" id="resetNames">Reset to defaults</button><button class="btn green" id="saveNames">Save</button></div></div></section>
<section class="board" id="board"><div class="board-card"><div class="board-tools"><button class="btn" data-tool="off">Offense</button><button class="btn" data-tool="def">Defense</button><button class="btn" data-tool="disc">Disc</button><button class="btn" data-tool="red">Red line</button><button class="btn" data-tool="white">White line</button><button class="btn" id="undoBoard">Undo</button><button class="btn" id="clearBoard">Clear</button><button class="btn" id="closeBoard">Close</button></div><div class="board-field" id="boardField"><svg class="draw-svg" id="drawSvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div></div></section>
<script>
const $=id=>document.getElementById(id);
const defaultRosters={
 line1:{label:'Line 1',rotate:'Bash',players:[['Kira','KI','handler'],['Cole','CO','handler'],['Charlie','CH','cutter'],['Antonio','AN','cutter'],['Richard','RI','cutter'],['April','AP','cutter'],['Kristen','KR','cutter']]},
 line2:{label:'Line 2',rotate:'Louis',players:[['Michelle','MI','handler'],['Harry','HA','handler'],['Amelia','AM','cutter'],['Jevin','JE','cutter'],['Melissa','ME','cutter'],['Nero','NE','cutter'],['Jon','JO','hybrid']]}
};
const clone=x=>JSON.parse(JSON.stringify(x));
const rosterStore='ufc-rosters-v2';
let rosters=clone(defaultRosters), team='line1', player='', sequence='pull', pullSide='middle', step=0, timer=null;
try{localStorage.removeItem('ufc-rosters');const saved=localStorage.getItem(rosterStore);if(saved)rosters=JSON.parse(saved)}catch(e){}
const ids=['A','B','C','D','E','F','G'];
const seqLabels={pull:'Pull to stack',give:'Give-and-go flow',endzone:'Endzone basics',ho:'Horizontal stack'};
const pulls={
 middle:{label:'middle',landing:[50,76],hhStart:[48,92],h2Start:[56,92],outlet:[58,68],c1:[62,26],c2:[58,54]},
 left:{label:'left',landing:[31,76],hhStart:[34,92],h2Start:[52,92],outlet:[47,68],c1:[42,26],c2:[35,54]},
 right:{label:'right',landing:[69,76],hhStart:[66,92],h2Start:[48,92],outlet:[53,68],c1:[58,26],c2:[65,54]}
};
const lerp=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];
const mark=(p,dx=-4,dy=0)=>[p[0]+dx,p[1]+dy];
function dmap(o){const out={};Object.entries(o).forEach(([k,v],i)=>out['D'+(i+1)]=v);return out}
function route(kind,d){return [kind,d]}
const baseJobs={
 A:['Watch the disc and read the pull. Make the first touch calm.','Get to the landing spot early and look for the outlet.','Catch or pick up cleanly. Use the easy outlet.','Move the disc to the outlet, then become the reset.'],
 B:['Become the safe outlet. Get wide enough for an easy first pass.','Stay available for the first pass. Do not chase the pull.','Be the easy reset/outlet. Give the thrower a calm option.','Catch the first pass and face the stack.'],
 C:['Get organized near the front of the stack. You are the first real cut.','Hold the front lane. Wait until the handlers are set.','Sell one way, cut hard the other, then clear if you do not get it.','After your cut, get out fast so the next cutter has the lane.'],
 D:['Hold your space behind the first cutter. Do not leave early.','Stay behind the first cutter and keep the lane clean.','Wait for the first cut to start. Your timing matters.','Continue only if the lane is there. If it is covered, clear hard.'],
 E:['Stay central in the stack and watch the first cut develop.','Keep the middle lane organized. Do not drift into traffic.','Wait for the cutter ahead of you to finish.','If your look is shut down, leave the lane and get to the back.'],
 F:['Hold the back-left space. Do not drift into the first cutting lane.','Keep the back of the stack spaced.','Stay patient and give the front cutters room.','Be ready after the middle cutters clear, then clear if you do not get it.'],
 G:['Hold the back-right space. Stay patient and keep the lane clear.','Keep width and do not crowd the stack.','Watch the play develop before you move.','Stay ready as the back option. If you cut and miss, get out fast.']
};
function makePullSteps(){
 const s=pulls[pullSide], land=s.landing, out=s.outlet, discMid=lerp([50,8],land,.52), hhHalf=lerp(s.hhStart,land,.55), h2Half=lerp(s.h2Start,out,.48);
 const discEarly=lerp([50,8],land,.28);
 const st={C:[50,58],D:[50,52],E:[50,46],F:[50,40],G:[50,34]};
 const hhTrail=[out[0]-8,73], charlieCatch=[66,60], antonioCatch=[79,56], antonioClear=[73,45], coleDump=[66,66], kiraReset=[59,66], richardHelp=[73,45], charlieBack=[56,34], antonioUpline=[87,44], aprilAttack=[70,33], redZoneSpot=[73,25], endzoneDump=[62,34], endzoneClear=[45,22], scoreSpot=[78,17], resetAgain=[62,35];
 const pullPath=`M50,8 C${s.c1[0]},${s.c1[1]} ${s.c2[0]},${s.c2[1]} ${land[0]},${land[1]}`;
 const kiraRun=`M${s.hhStart[0]},${s.hhStart[1]} C${s.hhStart[0]},86 ${land[0]-1},81 ${land[0]},${land[1]}`;
 const coleRun=`M${s.h2Start[0]},${s.h2Start[1]} C${h2Half[0]},83 ${out[0]},76 ${out[0]},${out[1]}`;
 const flowPath='M48,90 C48,80 49,70 50,60';
 const outletPass=`M${land[0]},${land[1]} C${(land[0]+out[0])/2},73 ${(land[0]+out[0])/2},70 ${out[0]},${out[1]}`;
 const charlieCut=`M${st.C[0]},${st.C[1]} C47,61 44,62 43,61 C51,60 59,60 ${charlieCatch[0]},${charlieCatch[1]}`;
 const coleToCharlie=`M${out[0]},${out[1]} C${(out[0]+charlieCatch[0])/2},64 ${charlieCatch[0]-2},62 ${charlieCatch[0]},${charlieCatch[1]}`;
 const antonioCont=`M${st.D[0]},${st.D[1]} C58,53 67,53 ${antonioCatch[0]},${antonioCatch[1]}`;
 const antonioClearPath=`M${st.D[0]},${st.D[1]} C57,51 64,48 ${antonioClear[0]},${antonioClear[1]}`;
 const charlieToAntonio=`M${charlieCatch[0]},${charlieCatch[1]} C72,59 76,57 ${antonioCatch[0]},${antonioCatch[1]}`;
 const kiraResetPath=`M${hhTrail[0]},${hhTrail[1]} C43,69 37,66 38,63 C46,62 54,64 ${kiraReset[0]},${kiraReset[1]}`;
 const charlieReturnOption=`M${antonioCatch[0]},${antonioCatch[1]} C75,55 71,56 ${charlieCatch[0]+1},${charlieCatch[1]-1}`;
 const charlieHardClear=`M${charlieCatch[0]},${charlieCatch[1]} C70,58 73,54 74,49 C72,42 65,36 ${charlieBack[0]},${charlieBack[1]}`;
 const richardHelpPath=`M${st.E[0]},${st.E[1]} C56,47 61,47 65,46 C68,45 71,45 ${richardHelp[0]},${richardHelp[1]}`;
 const coleResetCut=`M${out[0]},${out[1]} C69,66 73,63 75,59 C70,61 67,64 ${coleDump[0]},${coleDump[1]}`;
 const antonioDumpPass=`M${antonioCatch[0]},${antonioCatch[1]} C76,60 71,64 ${coleDump[0]},${coleDump[1]}`;
 const antonioUplinePath=`M${coleDump[0]},${coleDump[1]} C71,64 77,58 ${antonioUpline[0]},${antonioUpline[1]}`;
 const kiraWide=[48,64], coleSpaced=[66,66], aprilUnder=[66,49], aprilClear=[54,36], richardWait=[61,45];
 const coleToKiraSwing=`M${coleSpaced[0]},${coleSpaced[1]} C61,67 54,66 ${kiraWide[0]},${kiraWide[1]}`;
 const nextUnderCut=`M${st.F[0]},${st.F[1]} C56,43 62,47 ${aprilUnder[0]},${aprilUnder[1]}`;

function go(d){step=Math.max(0,Math.min(activeSteps().length-1,step+d));render()}function stop(){clearInterval(timer);timer=null;play.innerHTML='<i data-lucide="play"></i>';if(window.lucide)lucide.createIcons()}function start(){if(timer){stop();return}play.innerHTML='<i data-lucide="pause"></i>';if(window.lucide)lucide.createIcons();timer=setInterval(()=>{if(step>=activeSteps().length-1){stop();return}go(1)},1500)}

function openEdit(){editTeam.innerHTML=Object.entries(rosters).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');editTeam.value=team;drawNameRows();nameModal.classList.add('open')}function drawNameRows(){const t=editTeam.value, r=rosters[t];teamNameInput.value=r.label;nameRows.innerHTML='<div class="name-row"><b>Name</b><b>Abbr</b><b>Role</b></div>'+r.players.map((p,i)=>`<div class="name-row"><input value="${p[0]}" data-i="${i}" data-k="0"><input value="${p[1]}" maxlength="3" data-i="${i}" data-k="1"><select data-i="${i}" data-k="2"><option ${p[2]==='handler'?'selected':''}>handler</option><option ${p[2]==='cutter'?'selected':''}>cutter</option><option ${p[2]==='hybrid'?'selected':''}>hybrid</option></select></div>`).join('')}editNames.onclick=openEdit;closeNames.onclick=()=>nameModal.classList.remove('open');editTeam.onchange=drawNameRows;saveNames.onclick=()=>{const t=editTeam.value;rosters[t].label=teamNameInput.value.trim()||rosters[t].label;nameRows.querySelectorAll('input,select').forEach(el=>{const i=+el.dataset.i,k=+el.dataset.k;if(!Number.isNaN(i))rosters[t].players[i][k]=el.value.trim()||rosters[t].players[i][k]});localStorage.setItem(rosterStore,JSON.stringify(rosters));nameModal.classList.remove('open');render()};resetNames.onclick=()=>{rosters=clone(defaultRosters);localStorage.removeItem(rosterStore);localStorage.removeItem('ufc-rosters');editTeam.innerHTML=Object.entries(rosters).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');editTeam.value=team;drawNameRows();render()};
let tool='off',hist=[],drag=null,line=null;whiteboardBtn.onclick=()=>{board.classList.add('open');whiteboardBtn.classList.add('active')};closeBoard.onclick=()=>{board.classList.remove('open');whiteboardBtn.classList.remove('active')};document.querySelectorAll('[data-tool]').forEach(b=>b.onclick=()=>tool=b.dataset.tool);function bp(e){const r=boardField.getBoundingClientRect();return [Math.max(3,Math.min(97,(e.clientX-r.left)/r.width*100)),Math.max(3,Math.min(97,(e.clientY-r.top)/r.height*100))]}boardField.onpointerdown=e=>{const old=e.target.closest('.board-piece');const p=bp(e);if(old){drag=old;return}if(tool==='red'||tool==='white'){line=document.createElementNS('http://www.w3.org/2000/svg','path');line.pts=[p];line.setAttribute('class','draw-line '+tool);drawSvg.appendChild(line);hist.push(line);return}const el=document.createElement('div');el.className='puck board-piece '+(tool==='def'?'def':'off');el.textContent=tool==='disc'?'':tool==='def'?'D':'O';pos(el,p);boardField.appendChild(el);hist.push(el)};boardField.onpointermove=e=>{if(drag)pos(drag,bp(e));if(line){line.pts.push(bp(e));line.setAttribute('d',line.pts.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join(' '))}};document.addEventListener('pointerup',()=>{drag=null;line=null});undoBoard.onclick=()=>{const x=hist.pop();if(x)x.remove()};clearBoard.onclick=()=>{hist.forEach(x=>x.remove());hist=[];drawSvg.innerHTML=''};render();
</script>
