<style>
:root{--cream:#f6f1e9;--card:#fffdfa;--ink:#0c1a1d;--muted:#52605e;--green:#0e4b24;--green2:#143f22;--line:rgba(255,255,255,.38);--blue:#1669e8;--black:#171717}
*{box-sizing:border-box}html,body{margin:0}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,#fff 0,#f8f4ed 34%,var(--cream) 100%);color:var(--ink)}button,select,input{font:inherit}button{cursor:pointer}
.shell{max-width:1480px;margin:12px auto;padding:24px 32px 28px;background:rgba(255,253,249,.88);border:1px solid #e5ddd2;border-radius:16px;box-shadow:0 18px 60px rgba(41,31,18,.08)}
.brand{display:flex;align-items:center;gap:14px;color:var(--green);font-weight:900;font-size:27px}.logo{width:48px;height:48px;border:3px solid var(--green);border-radius:13px;display:grid;place-items:center}.logo svg{width:31px;height:31px}
h1{font-size:52px;line-height:1.02;letter-spacing:0;margin:18px 0 8px} .sub{font-size:20px;color:#3d4646;margin:0 0 20px}
.topbar{display:grid;grid-template-columns:minmax(0,1fr) 230px 250px auto;gap:30px;align-items:end;margin-top:8px}.tabs{display:flex;border:1px solid #ddd5ca;border-radius:10px;overflow:hidden;width:max-content;max-width:100%}.tab{min-width:165px;border:0;border-right:1px solid #ddd5ca;background:transparent;padding:17px 24px;font-weight:800;font-size:18px}.tab:last-child{border-right:0}.tab.active{background:var(--green);color:#fff}
label{display:block;font-size:14px;font-weight:750;color:#1b2829}.select{position:relative;margin-top:8px}select{appearance:none;width:100%;border:1px solid #ddd5ca;border-radius:10px;background:#fffdfa;padding:14px 42px 14px 16px;font-size:18px;font-weight:850;color:#111}.select:after{content:"";position:absolute;right:16px;top:50%;width:9px;height:9px;border-right:2px solid #111;border-bottom:2px solid #111;transform:translateY(-70%) rotate(45deg);pointer-events:none}.edit{border:0;background:transparent;color:var(--green);font-weight:850;padding:0 0 14px;text-decoration:underline;text-underline-offset:3px}.w{position:fixed;right:18px;top:18px;z-index:50;width:30px;height:30px;border-radius:999px;border:1px solid #d8d0c5;background:#fffdfa;color:#68706d;font-weight:900;opacity:.55}.w:hover,.w.active{opacity:1}
.layout{display:grid;grid-template-columns:minmax(580px,1fr) 440px;gap:32px;margin-top:22px}.field-card{position:relative;min-height:755px;border-radius:14px;overflow:hidden;background:radial-gradient(circle at 50% 40%,rgba(255,255,255,.08),transparent 34%),linear-gradient(90deg,rgba(255,255,255,.025) 0 1px,transparent 1px 8px),linear-gradient(180deg,#164f27,#113d22);box-shadow:inset 0 0 0 1px rgba(255,255,255,.22),0 16px 35px rgba(18,44,23,.20)}
.field-inner{position:absolute;inset:20px 62px 28px;border-left:2px solid rgba(255,255,255,.35);border-right:2px solid rgba(255,255,255,.35);border-bottom:2px solid rgba(255,255,255,.35)}.endline{position:absolute;left:0;right:0;top:48px;height:1px;background:var(--line)}.goal{position:absolute;top:26px;left:0;right:0;text-align:center;color:rgba(255,255,255,.38);font-size:24px;letter-spacing:.22em;font-weight:900}.start{position:absolute;bottom:72px;left:0;right:0;text-align:center;color:rgba(255,255,255,.42);font-size:29px;letter-spacing:.18em;font-weight:900}.yard{position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,.22)}.num{position:absolute;color:rgba(255,255,255,.45);font-size:28px;font-weight:850}.num.l{left:76px}.num.r{right:76px}.hashes{position:absolute;top:78px;bottom:166px;width:10px;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.28) 0 1px,transparent 1px 14px)}.hashes.l{left:74px}.hashes.r{right:74px}
.routes{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:4}.route{fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:3;filter:drop-shadow(0 2px 2px rgba(0,0,0,.18))}.route.disc{stroke:#fff;stroke-width:2.2;stroke-dasharray:6 8;opacity:.88}.route.move{stroke:#2fa7ff}.route.clear{stroke:#ff705f}.route.reset{stroke:#9c78ff}.route.fake{stroke:#ffad45;stroke-dasharray:6 7}.route.trail{stroke:#48b8ff;stroke-width:1.7;opacity:.72;filter:none}.route.defense{stroke:rgba(255,255,255,.58);stroke-width:1.45;stroke-dasharray:5 7;opacity:.7;filter:none}
.puck{--x:50;--y:50;position:absolute;left:calc(var(--x)*1%);top:calc(var(--y)*1%);transform:translate(-50%,-50%);z-index:6;width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-weight:950;font-size:18px;transition:left .55s ease,top .55s ease,box-shadow .2s ease}.field-card.pull-animating .puck{transition:left 1.25s cubic-bezier(.2,.85,.2,1),top 1.25s cubic-bezier(.2,.85,.2,1),box-shadow .2s ease}.off{background:var(--blue);color:#fff;border:4px solid #fff;box-shadow:0 0 0 3px rgba(255,255,255,.42),0 8px 20px rgba(0,0,0,.34),0 0 20px rgba(75,164,255,.55)}.def{width:43px;height:43px;background:var(--black);color:#fff;border:3px solid #9b9b9b;box-shadow:0 8px 18px rgba(0,0,0,.42);font-size:16px}.selected-player{box-shadow:0 0 0 5px #fff,0 0 0 11px rgba(255,255,255,.45),0 0 28px 12px rgba(188,255,185,.75)!important}
.disc{--x:50;--y:25;position:absolute;left:calc(var(--x)*1%);top:calc(var(--y)*1%);z-index:8;width:42px;height:19px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#f1f1f1 55%,#b8b8b8);border:3px solid #fff;box-shadow:0 0 18px rgba(255,255,255,.9),0 8px 15px rgba(0,0,0,.25);transform:translate(-50%,-50%) rotate(-5deg);transition:left .55s ease,top .55s ease}.field-card.pull-animating .disc{transition:left 1.35s cubic-bezier(.18,.82,.22,1),top 1.35s cubic-bezier(.18,.82,.22,1)}
.panel{display:grid;gap:14px}.lesson-card,.why,.controls{background:var(--card);border:1px solid #e2d9ce;border-radius:14px;box-shadow:0 14px 35px rgba(42,31,18,.10)}.lesson-card{padding:34px 34px 24px}.count{color:var(--green);font-weight:900;font-size:19px;margin-bottom:20px}.lesson-card h2{font-size:38px;line-height:1.08;margin:0 0 20px}.body{font-size:21px;line-height:1.55;color:#1e2a2d;white-space:pre-line}.callout{margin-top:26px;border:1px solid #c6dfcc;background:linear-gradient(135deg,#f5fbf4,#edf8f1);border-radius:10px;padding:22px 24px;display:grid;grid-template-columns:46px 1fr;gap:16px;color:#103b20}.callout i{width:34px;height:34px}.callout b{display:block;font-size:18px;margin-bottom:6px}.callout div:last-child{font-size:17px;line-height:1.45}.chips{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:22px}.chip{border:1px solid #eadfd4;background:#fffdfa;border-radius:9px;padding:17px}.chip b{display:block;color:#76716b;font-size:13px;letter-spacing:.10em;text-transform:uppercase;margin-bottom:7px}.chip span{font-size:18px;font-weight:800}
.why{padding:0}.why button{width:100%;border:0;background:transparent;display:flex;align-items:center;gap:12px;padding:18px 26px;font-size:20px;font-weight:900;color:#111}.why button .chev{margin-left:auto}.why-text{display:none;padding:0 28px 22px;font-size:18px;line-height:1.45;color:#3f4b4a}.why.open .why-text{display:block}.controls{padding:10px 24px;display:flex;justify-content:space-between;gap:14px}.ctrl{width:82px;height:60px;border:1px solid #e4d9cf;background:#fffdfa;border-radius:10px;display:grid;place-items:center}.ctrl.primary{background:var(--green);color:#fff}.ctrl i{width:29px;height:29px}
.modal,.board{position:fixed;inset:0;background:rgba(12,18,16,.36);z-index:80;display:none;align-items:center;justify-content:center;padding:18px}.modal.open,.board.open{display:flex}.modal-card{width:min(940px,100%);max-height:92vh;overflow:auto;background:#fffdfa;border-radius:16px;border:1px solid #e2d9ce;box-shadow:0 30px 90px rgba(0,0,0,.25);padding:26px}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px}.modal-head h2{margin:0;font-size:28px}.team-name{margin:12px 0}.team-name input{width:100%;border:1px solid #ddd5ca;border-radius:10px;background:#fffdfa;padding:12px 14px;font-size:17px;font-weight:800}.name-grid{display:grid;gap:10px}.name-row{display:grid;grid-template-columns:1.1fr 90px 140px;gap:10px}.name-row input,.name-row select{font-size:15px;min-height:38px;padding:8px 10px}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}.btn{border:1px solid #d8d0c5;border-radius:9px;background:#fffdfa;padding:11px 16px;font-weight:850}.btn.green{background:var(--green);color:#fff}
.board-card{width:min(900px,100%);background:#fffdfa;border-radius:16px;padding:18px}.board-field{position:relative;height:520px;border-radius:12px;background:linear-gradient(180deg,#164f27,#113d22);overflow:hidden;touch-action:none}.board-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.board-piece{position:absolute;left:calc(var(--x)*1%);top:calc(var(--y)*1%);transform:translate(-50%,-50%);z-index:6}.draw-svg{position:absolute;inset:0;width:100%;height:100%;z-index:4}.draw-line{fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.red{stroke:#ff6655}.white{stroke:#fff}
@media(max-width:1050px){.shell{padding:18px}.topbar{grid-template-columns:1fr 1fr}.tabs{width:100%}.tab{min-width:0;flex:1;padding:14px 10px;font-size:15px}.layout{grid-template-columns:1fr}.field-card{min-height:560px}.panel{max-width:none}.edit{justify-self:start;padding-bottom:0}h1{font-size:42px}}
@media(max-width:620px){.shell{margin:0;border-radius:0;padding:14px}.brand{font-size:21px}.logo{width:38px;height:38px}h1{font-size:34px}.sub{font-size:16px}.topbar{grid-template-columns:1fr;gap:12px}.tabs{overflow:auto}.tab{min-width:150px}.layout{gap:16px}.field-card{min-height:470px}.field-inner{inset:16px 34px 24px}.route{stroke-width:2}.route.disc{stroke-width:1.8}.route.trail{stroke-width:1.2;opacity:.68}.route.defense{stroke-width:1.1;opacity:.58}.puck{width:38px;height:38px;font-size:14px}.def{width:34px;height:34px;font-size:13px}.lesson-card{padding:22px}.lesson-card h2{font-size:30px}.body{font-size:18px}.chips{gap:8px}.chip{padding:12px}.controls{position:sticky;bottom:8px;z-index:30}.name-row{grid-template-columns:1fr}.num{display:none}}
</style>
</head>
<body>
<button class="w" id="whiteboardBtn" title="Coach board">W</button>
<main class="shell">
  <header>
    <div class="brand"><span class="logo"><i data-lucide="shield"></i></span><span>Ultimate Flow Coach</span></div>
    <h1>Learn 7v7 Ultimate Frisbee</h1>
    <p class="sub">Simple step-by-step roles for beginners.</p>
  </header>
  <section class="topbar">
    <div class="tabs" id="tabs"></div>
    <label>Team<div class="select"><select id="teamSelect"></select></div></label>
    <label>Player<div class="select"><select id="playerSelect"></select></div></label>
    <button class="edit" id="editNames">Edit names</button>
  </section>
  <section class="layout">
    <div class="field-card" id="field">
      <div class="field-inner"></div><div class="endline"></div><div class="goal">ENDZONE</div><div class="start">START HERE</div>
      <div class="yard" style="top:21%"></div><div class="yard" style="top:48%"></div><div class="yard" style="top:77%"></div>
      <div class="num l" style="top:39%">20</div><div class="num r" style="top:39%">20</div><div class="num l" style="top:58%">10</div><div class="num r" style="top:58%">10</div>
      <div class="hashes l"></div><div class="hashes r"></div>
      <svg class="routes" id="routes" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
      <div class="disc" id="disc"></div>
    </div>
    <aside class="panel">
      <article class="lesson-card">
        <div class="count" id="stepCount"></div>
        <h2 id="stepTitle"></h2>
        <div class="body" id="stepBody"></div>
        <div class="callout"><i data-lucide="user-round"></i><div><b id="calloutTitle"></b><div id="calloutText"></div></div></div>
        <div class="chips"><div class="chip"><b>Disc</b><span id="discChip"></span></div><div class="chip"><b>Reset</b><span id="resetChip"></span></div><div class="chip"><b>Next</b><span id="nextChip"></span></div></div>
      </article>
      <section class="why" id="whyBox"><button id="whyToggle"><i data-lucide="circle-help"></i>Why?<i class="chev" data-lucide="chevron-down"></i></button><div class="why-text" id="whyText"></div></section>
      <nav class="controls"><button class="ctrl" id="prev" title="Back"><i data-lucide="skip-back"></i></button><button class="ctrl primary" id="play" title="Play"><i data-lucide="play"></i></button><button class="ctrl" id="next" title="Next"><i data-lucide="skip-forward"></i></button><button class="ctrl" id="reset" title="Reset step"><i data-lucide="rotate-cw"></i></button></nav>
    </aside>
  </section>
</main>
<section class="modal" id="nameModal"><div class="modal-card"><div class="modal-head"><h2>Edit names</h2><button class="btn" id="closeNames">Cancel</button></div><label>Team<div class="select"><select id="editTeam"></select></div></label><label class="team-name">Team name<input id="teamNameInput"></label><div class="name-grid" id="nameRows"></div><div class="modal-actions"><button class="btn" id="resetNames">Reset to defaults</button><button class="btn green" id="saveNames">Save</button></div></div></section>
<section class="board" id="board"><div class="board-card"><div class="board-tools"><button class="btn" data-tool="off">Offense</button><button class="btn" data-tool="def">Defense</button><button class="btn" data-tool="disc">Disc</button><button class="btn" data-tool="red">Red line</button><button class="btn" data-tool="white">White line</button><button class="btn" id="undoBoard">Undo</button><button class="btn" id="clearBoard">Clear</button><button class="btn" id="closeBoard">Close</button></div><div class="board-field" id="boardField"><svg class="draw-svg" id="drawSvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div></div></section>
<script>
const $=id=>document.getElementById(id);
const defaultRosters={
 line1:{label:'Line 1',rotate:'Bash',players:[['Kira','KI','handler'],['Cole','CO','handler'],['Charlie','CH','cutter'],['Antonio','AN','cutter'],['Richard','RI','cutter'],['April','AP','cutter'],['Kristen','KR','cutter']]},
 line2:{label:'Line 2',rotate:'Louis',players:[['Michelle','MI','handler'],['Harry','HA','handler'],['Amelia','AM','cutter'],['Jevin','JE','cutter'],['Melissa','ME','cutter'],['Nero','NE','cutter'],['Jon','JO','hybrid']]}
};
const clone=x=>JSON.parse(JSON.stringify(x));
let rosters=clone(defaultRosters), team='line1', player='', sequence='pull', step=0, timer=null;
try{const saved=localStorage.getItem('ufc-rosters');if(saved)rosters=JSON.parse(saved)}catch(e){}
const ids=['A','B','C','D','E','F','G'];
const seqLabels={pull:'Pull to stack',give:'Give-and-go flow',endzone:'Endzone basics',ho:'Horizontal stack'};
const baseJobs={
 A:['Watch the disc and read the pull. Make the first touch calm.','Get to the landing spot early and look for the outlet.','Catch or pick up cleanly. Use the easy outlet.','Move the disc to the outlet, then become the reset.'],
 B:['Become the safe outlet. Get wide enough for an easy first pass.','Stay available for the first pass. Do not chase the pull.','Be the easy reset/outlet. Give the thrower a calm option.','Catch the first pass and face the stack.'],
 C:['Get organized near the front of the stack. You are the first real cut.','Hold the front lane. Wait until the handlers are set.','Prepare to sell the fake before your real cut.','Get ready to make the first cut after the disc moves.'],
 D:['Hold your space behind the first cutter. Do not leave early.','Stay behind the first cutter and keep the lane clean.','Wait for the first cut to start. Your timing matters.','Be ready to continue after the first cutter.'],
 E:['Stay central in the stack and watch the first cut develop.','Keep the middle lane organized. Do not drift into traffic.','Wait for the cutter ahead of you to finish.','Get ready for the next clean lane.'],
 F:['Hold the back-left space. Do not drift into the first cutting lane.','Keep the back of the stack spaced.','Stay patient and give the front cutters room.','Be ready after the middle cutters clear.'],
 G:['Hold the back-right space. Stay patient and keep the lane clear.','Keep width and do not crowd the stack.','Watch the play develop before you move.','Stay ready as the back option.']
};
const steps=[
 {title:'Pull is thrown',disc:'A',reset:'B',next:'C',discPos:[47,62],discStart:[50,8],startP:{A:[42,90],B:[58,90],C:[47,90],D:[52,88],E:[49,86],F:[39,90],G:[62,90]},startD:{A:[23,8],B:[39,8],C:[55,8],D:[70,8],E:[82,8]},p:{A:[47,62],B:[64,70],C:[48,55],D:[50,47],E:[50,39],F:[50,31],G:[50,23]},d:{A:[43,62],B:[67,68],C:[53,55],D:[55,47],E:[55,39]},routes:[['disc',[[50,8],[50,24],[49,43],[47,62]]],['trail',[[42,90],[45,76],[47,62]]],['trail',[[58,90],[62,79],[64,70]]],['trail',[[47,90],[48,70],[48,55]]],['trail',[[52,88],[51,64],[50,47]]],['trail',[[49,86],[50,59],[50,39]]],['trail',[[39,90],[46,62],[50,31]]],['trail',[[62,90],[55,61],[50,23]]],['defense',[[23,8],[34,35],[43,62]]],['defense',[[39,8],[52,40],[67,68]]],['defense',[[55,8],[54,33],[53,55]]],['defense',[[70,8],[62,31],[55,47]]],['defense',[[82,8],[66,29],[55,39]]]],why:'The pull gives everyone time to run into their first jobs. The handlers get near the disc, and the cutters line up so only one person cuts first.',whole:'Watch the disc, the handlers, and where the stack forms.'},
 {title:'Kira settles the pull.',disc:'A',reset:'B',next:'B',discPos:[47,62],p:{A:[47,62],B:[64,70],C:[48,55],D:[50,47],E:[50,39],F:[50,31],G:[50,23]},d:{A:[43,62],B:[67,68],C:[53,55],D:[55,47],E:[55,39]},routes:[['reset',[[47,62],[64,70]]]],why:'Kira pauses at the disc while Cole stays wide. That keeps the first pass easy and avoids a rushed throw.'},
 {title:'Cole is the easy outlet.',disc:'A',reset:'B',next:'C',discPos:[47,62],p:{A:[47,62],B:[64,70],C:[48,55],D:[50,47],E:[50,39],F:[50,31],G:[50,23]},d:{A:[43,62],B:[67,68],C:[53,55],D:[55,47],E:[55,39]},routes:[['reset',[[47,62],[64,70]]]],why:'Cole is close enough for Kira to hit, but wide enough that one defender cannot guard both handlers.'},
 {title:'Kira moves it to Cole.',disc:'B',reset:'A',next:'C',discPos:[64,70],p:{A:[47,66],B:[64,70],C:[48,55],D:[50,47],E:[50,39],F:[50,31],G:[50,23]},d:{A:[43,66],B:[61,68],C:[53,55],D:[55,47],E:[55,39]},routes:[['disc',[[47,62],[64,70]]]],why:'Moving the disc to Cole sets the angle. Now the cutting lesson can begin from a clean vertical stack.'},
 {title:'Charlie sells the fake.',disc:'B',reset:'A',next:'D',discPos:[64,70],p:{A:[47,66],B:[64,70],C:[43,58],D:[50,47],E:[50,39],F:[50,31],G:[50,23]},d:{A:[43,66],B:[61,68],C:[49,57],D:[55,47],E:[55,39]},routes:[['fake',[[48,55],[41,60]]]],why:'Charlie does not run straight to the space he wants. The fake makes the defender shift first.'},
 {title:'Charlie cuts hard outside.',disc:'B',reset:'A',next:'D',discPos:[64,70],p:{A:[47,66],B:[64,70],C:[70,48],D:[51,46],E:[50,39],F:[50,31],G:[50,23]},d:{A:[43,66],B:[61,68],C:[63,51],D:[55,47],E:[55,39]},routes:[['fake',[[48,55],[41,60]]],['move',[[41,60],[56,52],[70,48]]]],why:'The hard plant gives Charlie separation. The defender trails because they reacted to the fake.'},
 {title:'Cole throws to Charlie.',disc:'C',reset:'B',next:'D',discPos:[70,48],p:{A:[47,66],B:[64,70],C:[70,48],D:[53,43],E:[50,39],F:[50,31],G:[50,23]},d:{A:[43,66],B:[61,68],C:[64,51],D:[57,45],E:[55,39]},routes:[['disc',[[64,70],[70,48]]],['move',[[50,47],[53,43]]]],why:'Antonio starts as the throw goes. If he leaves early, Charlie catches into a crowded lane.'},
 {title:'Antonio reads the next lane.',disc:'C',reset:'B',next:'E',discPos:[70,48],p:{A:[47,66],B:[64,70],C:[70,48],D:[75,34],E:[50,39],F:[50,31],G:[50,23]},d:{A:[43,66],B:[61,68],C:[64,51],D:[70,38],E:[55,39]},routes:[['move',[[53,43],[64,37],[75,34]]],['clear',[[53,43],[65,29],[78,23]]]],why:'Antonio has one window. If it is not open, clearing hard gives Richard the next clean lane.'},
 {title:'Charlie throws to Antonio.',disc:'D',reset:'B',next:'E',discPos:[75,34],p:{A:[47,66],B:[64,70],C:[64,22],D:[75,34],E:[50,39],F:[50,31],G:[50,23]},d:{A:[43,66],B:[61,68],C:[67,25],D:[70,38],E:[55,39]},routes:[['disc',[[70,48],[75,34]]],['clear',[[70,48],[70,33],[64,22]]]],why:"Charlie clears upfield first because Richard needs the lane behind him. If Charlie cuts across, he drags his defender into Richard's throw."},
 {title:'Richard gets his lane.',disc:'D',reset:'B',next:'B',discPos:[75,34],p:{A:[47,66],B:[64,70],C:[64,22],D:[75,34],E:[61,43],F:[50,31],G:[50,23]},d:{A:[43,66],B:[61,68],C:[67,25],D:[70,38],E:[56,43]},routes:[['move',[[50,39],[56,41],[61,43]]]],why:'Richard waits until Antonio is done. Then he gets his own lane without crossing Charlie.'},
 {title:'Use Cole as the reset.',disc:'B',reset:'B',next:'D',discPos:[64,70],p:{A:[47,66],B:[64,70],C:[64,22],D:[75,34],E:[61,43],F:[50,31],G:[50,23]},d:{A:[43,66],B:[61,68],C:[67,25],D:[70,38],E:[57,43]},routes:[['reset',[[75,34],[64,70]]]],why:'Cole stays behind the disc so Antonio has a safe option when Richard is covered.'},
 {title:'Antonio attacks up-line.',disc:'B',reset:'A',next:'E',discPos:[64,70],p:{A:[47,66],B:[64,70],C:[64,22],D:[70,52],E:[56,45],F:[50,31],G:[50,23]},d:{A:[43,66],B:[61,68],C:[67,25],D:[66,54],E:[59,45]},routes:[['move',[[75,34],[72,45],[70,52]]]],why:'The reset changes the angle. Antonio can attack up-line because Cole has the disc now.'}
];
const sequences={pull:steps,give:steps.slice(4),endzone:steps.slice(0,4),ho:steps.slice(0,4)};
function players(){return rosters[team].players.map((p,i)=>({id:ids[i],name:p[0],abbr:p[1],role:p[2]}))}
function name(id){return players().find(p=>p.id===id)?.name||id}
function abbr(id){return players().find(p=>p.id===id)?.abbr||id}
function activeSteps(){return sequences[sequence]||steps}
function playerBody(s){const ps=players(), p=ps.find(x=>x.id===player); if(!p)return '';
 const front=ps[ids.indexOf(player)-1]?.name, behind=ps[ids.indexOf(player)+1]?.name;
 const direct={A:`${p.name}, you're reading the pull. Get to the landing spot early and make the first touch calm.`,B:`${p.name}, you're the reset/outlet. Get wide enough that ${name('A')} has an easy first pass.`,C:`${p.name}, you're near the front of the stack. Get organized, then be ready to make the first real cut.`,D:`${p.name}, you're ahead of ${name('E')} in the stack. Hold your space until ${name('C')}'s cut starts.`,E:`${p.name}, you're in the middle of the stack. ${name('D')} is in front of you and ${name('C')} is behind you.`,F:`${p.name}, hold the back-left space. Don't drift into the first cutting lane.`,G:`${p.name}, hold the back-right space. Stay patient and keep the lane clear.`};
 return direct[player]+'\n\n'+(baseJobs[player]?.[Math.min(step,3)]||'Stay organized and keep the active lane clear.');
}
function callout(s){if(!player)return ['Whole team',s.whole||'Watch the disc, the two handlers, and where the stack forms.'];return ['Your job',baseJobs[player]?.[Math.min(step,3)]||'Stay ready and keep your lane clear.']}
function why(s){if(player==='E'&&step===0)return "You stay central because the stack needs a clear order. If you drift, the first cutter's lane gets crowded.";return s.why}
function drawRoutes(s){const svg=$('routes');svg.innerHTML='<defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="currentColor"/></marker></defs>';s.routes.forEach(r=>{const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('class','route '+r[0]);p.setAttribute('d',r[1].map((pt,i)=>(i?'L':'M')+pt[0]+','+pt[1]).join(' '));if(!['trail','defense','disc'].includes(r[0]))p.setAttribute('marker-end','url(#arrow)');svg.appendChild(p)})}
function ensurePucks(){ids.forEach(id=>{if(!$(id)){const e=document.createElement('div');e.id=id;e.className='puck off';$('field').appendChild(e)}});['D1','D2','D3','D4','D5'].forEach(id=>{if(!$(id)){const e=document.createElement('div');e.id=id;e.className='puck def';e.textContent=id;$('field').appendChild(e)}})}
function pos(el,p){el.style.setProperty('--x',p[0]);el.style.setProperty('--y',p[1])}
function renderSelectors(){teamSelect.innerHTML=Object.entries(rosters).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');teamSelect.value=team;playerSelect.innerHTML='<option value="">Whole team</option>'+players().map(p=>`<option value="${p.id}">${p.name}</option>`).join('');playerSelect.value=player;tabs.innerHTML=Object.entries(seqLabels).map(([k,v])=>`<button class="tab ${k===sequence?'active':''}" data-seq="${k}">${v}</button>`).join('')}
let renderTick=0;
function render(){ensurePucks();renderSelectors();const s=activeSteps()[step];const pullStart=sequence==='pull'&&step===0&&s.startP;const tick=++renderTick;$('field').classList.toggle('pull-animating',!!pullStart);players().forEach(p=>{const el=$(p.id);el.textContent=p.abbr;el.className='puck off'+(player===p.id?' selected-player':'');pos(el,pullStart?s.startP[p.id]:s.p[p.id])});Object.entries(s.d).forEach(([id,p],i)=>pos($('D'+(i+1)),pullStart?s.startD[id]:p));pos(disc,pullStart?s.discStart:s.discPos);drawRoutes(s);if(pullStart)requestAnimationFrame(()=>{if(tick!==renderTick)return;players().forEach(p=>pos($(p.id),s.p[p.id]));Object.entries(s.d).forEach(([id,p],i)=>pos($('D'+(i+1)),p));pos(disc,s.discPos)});stepCount.textContent=`Step ${step+1} of ${activeSteps().length}`;stepTitle.textContent=s.title;stepBody.textContent=pullStart?s.whole:(player?playerBody(s):'Watch the disc, the handlers, and where the stack forms.');const c=callout(s);calloutTitle.textContent=c[0];calloutText.textContent=c[1];discChip.textContent=name(s.disc);resetChip.textContent=name(s.reset);nextChip.textContent=name(s.next);whyText.textContent=why(s);if(window.lucide)lucide.createIcons()}
function go(d){step=Math.max(0,Math.min(activeSteps().length-1,step+d));render()}function stop(){clearInterval(timer);timer=null;play.innerHTML='<i data-lucide="play"></i>';if(window.lucide)lucide.createIcons()}function start(){if(timer){stop();return}play.innerHTML='<i data-lucide="pause"></i>';if(window.lucide)lucide.createIcons();timer=setInterval(()=>{if(step>=activeSteps().length-1){stop();return}go(1)},1500)}
tabs.onclick=e=>{const b=e.target.closest('button');if(!b)return;sequence=b.dataset.seq;step=0;stop();render()};teamSelect.onchange=e=>{team=e.target.value;player='';step=0;render()};playerSelect.onchange=e=>{player=e.target.value;render()};prev.onclick=()=>go(-1);next.onclick=()=>go(1);reset.onclick=()=>{step=0;stop();render()};play.onclick=start;whyToggle.onclick=()=>whyBox.classList.toggle('open');
function openEdit(){editTeam.innerHTML=Object.entries(rosters).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');editTeam.value=team;drawNameRows();nameModal.classList.add('open')}function drawNameRows(){const t=editTeam.value, r=rosters[t];teamNameInput.value=r.label;nameRows.innerHTML='<div class="name-row"><b>Name</b><b>Abbr</b><b>Role</b></div>'+r.players.map((p,i)=>`<div class="name-row"><input value="${p[0]}" data-i="${i}" data-k="0"><input value="${p[1]}" maxlength="3" data-i="${i}" data-k="1"><select data-i="${i}" data-k="2"><option ${p[2]==='handler'?'selected':''}>handler</option><option ${p[2]==='cutter'?'selected':''}>cutter</option><option ${p[2]==='hybrid'?'selected':''}>hybrid</option></select></div>`).join('')}editNames.onclick=openEdit;closeNames.onclick=()=>nameModal.classList.remove('open');editTeam.onchange=drawNameRows;saveNames.onclick=()=>{const t=editTeam.value;rosters[t].label=teamNameInput.value.trim()||rosters[t].label;nameRows.querySelectorAll('input,select').forEach(el=>{const i=+el.dataset.i,k=+el.dataset.k;if(!Number.isNaN(i))rosters[t].players[i][k]=el.value.trim()||rosters[t].players[i][k]});localStorage.setItem('ufc-rosters',JSON.stringify(rosters));nameModal.classList.remove('open');render()};resetNames.onclick=()=>{rosters=clone(defaultRosters);localStorage.removeItem('ufc-rosters');editTeam.innerHTML=Object.entries(rosters).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');editTeam.value=team;drawNameRows();render()};
let tool='off',hist=[],drag=null,line=null;whiteboardBtn.onclick=()=>{board.classList.add('open');whiteboardBtn.classList.add('active')};closeBoard.onclick=()=>{board.classList.remove('open');whiteboardBtn.classList.remove('active')};document.querySelectorAll('[data-tool]').forEach(b=>b.onclick=()=>tool=b.dataset.tool);function bp(e){const r=boardField.getBoundingClientRect();return [Math.max(3,Math.min(97,(e.clientX-r.left)/r.width*100)),Math.max(3,Math.min(97,(e.clientY-r.top)/r.height*100))]}boardField.onpointerdown=e=>{const old=e.target.closest('.board-piece');const p=bp(e);if(old){drag=old;return}if(tool==='red'||tool==='white'){line=document.createElementNS('http://www.w3.org/2000/svg','path');line.pts=[p];line.setAttribute('class','draw-line '+tool);drawSvg.appendChild(line);hist.push(line);return}const el=document.createElement('div');el.className='puck board-piece '+(tool==='def'?'def':'off');el.textContent=tool==='disc'?'':tool==='def'?'D':'O';pos(el,p);boardField.appendChild(el);hist.push(el)};boardField.onpointermove=e=>{if(drag)pos(drag,bp(e));if(line){line.pts.push(bp(e));line.setAttribute('d',line.pts.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join(' '))}};document.addEventListener('pointerup',()=>{drag=null;line=null});undoBoard.onclick=()=>{const x=hist.pop();if(x)x.remove()};clearBoard.onclick=()=>{hist.forEach(x=>x.remove());hist=[];drawSvg.innerHTML=''};render();
</script>
