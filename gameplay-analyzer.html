<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Gameplay Analyzer | Learn Ultimate Frisbee</title>
<style>
:root{--green:#0e4b24;--card:#fffdfa;--ink:#0c1a1d;--muted:#52605e;--border:#e5ddd2}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:#f6f1e9;color:var(--ink)}
.lock-shell{min-height:80vh;display:grid;place-items:center;padding:24px}
.lock-card{width:min(100%,420px);border:1px solid var(--border);border-radius:16px;background:var(--card);padding:24px;box-shadow:0 18px 50px rgba(42,31,18,.08)}
.lock-card h1{margin:8px 0;font-size:26px}.lock-card p{margin:0 0 16px;color:var(--muted);line-height:1.45;font-size:14px}
.badge{display:inline-flex;border:1px solid rgba(14,75,36,.22);border-radius:999px;padding:4px 10px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--green)}
label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:12px 0 6px}
input{width:100%;border:1px solid #ddd5ca;border-radius:9px;padding:10px 12px;font-size:14px}
.actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
button,.back{border-radius:9px;padding:10px 14px;font-size:13px;font-weight:850;cursor:pointer}
button.primary{background:var(--green);border:1px solid var(--green);color:#fff}
button,.back.secondary{background:var(--card);border:1px solid #d8d0c5;color:var(--ink);text-decoration:none;display:inline-flex;align-items:center}
.lock-error{color:#b42318;font-size:12px;font-weight:700}
</style>
</head>
<body>
<div id="lockShell" class="lock-shell">
  <div class="lock-card">
    <span class="badge">Private prototype</span>
    <h1>Gameplay Analyzer is locked.</h1>
    <p>Enter access code to open the private research workspace. No public upload or production ML.</p>
    <label for="lockCodeInput">Access code<input id="lockCodeInput" type="password" autocomplete="off" spellcheck="false" placeholder="Enter code" /></label>
    <p class="lock-error" id="lockError" hidden>Wrong code. Still locked.</p>
    <div class="actions">
      <button class="primary" id="lockUnlockBtn" type="button">Unlock</button>
      <a class="back secondary" href="index.html">Back to app</a>
    </div>
  </div>
</div>
<script>
const LAB_ACCESS_CODE='ultimate-lab',LAB_UNLOCK_KEY='ufc-gameplay-analyzer-unlocked';
const lockShell=document.getElementById('lockShell'),lockCodeInput=document.getElementById('lockCodeInput'),lockError=document.getElementById('lockError'),lockUnlockBtn=document.getElementById('lockUnlockBtn');
function isUnlocked(){try{return localStorage.getItem(LAB_UNLOCK_KEY)==='1'||new URLSearchParams(location.search).get('lab')===LAB_ACCESS_CODE}catch(e){return false}}
function setUnlocked(){try{localStorage.setItem(LAB_UNLOCK_KEY,'1')}catch(e){}}
function goWorkspace(){location.replace('analyzer/web/index.html'+location.search+location.hash)}
function tryUnlock(){if(lockCodeInput.value.trim()===LAB_ACCESS_CODE){setUnlocked();lockError.hidden=true;goWorkspace();return}lockError.hidden=false}
if(new URLSearchParams(location.search).get('lab')===LAB_ACCESS_CODE)setUnlocked();
if(isUnlocked())goWorkspace();
lockUnlockBtn.onclick=()=>tryUnlock();
lockCodeInput.onkeydown=e=>{if(e.key==='Enter')tryUnlock()};
</script>
</body>
</html>
